<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - Home Video Archive</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="contact"></body>
    <div id="wrapper">
    <header>
        <h1>Home Video Archive</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="mycollection.html">My Collection</a>
        <a href="directors.html">Directors</a>
        <a href="physicalmedia.html">Why Physical Media?</a>
        <a href="contact.html">Contact</a>
    </nav>
    <main>
        <section id="intro">
            <h2>Contact</h2>
            <p>Have a question, suggestion, or favorite film recommendation? Send a message below.</p>
        </section>
        <section id="contact-section">
        <form method="get" action="thankyou.html">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="favorite">Favorite Movie (Optional):</label>
            <input type="text" id="favorite" name="favorite">

            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <input type="submit" value="Submit">
        </form>
        </section>
    </main>
    <footer>
        <p>
            <a href="sources.html">Sources</a>
            <a href="contact.html">Contact</a>
        </p>
    </footer>
    </div>
</body>
</html>
